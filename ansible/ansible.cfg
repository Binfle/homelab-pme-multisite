# Configuration Ansible — homelab-pme-multisite
# Référence : https://docs.ansible.com/ansible/latest/reference_appendices/config.html

[defaults]
# Inventaire par défaut
inventory = inventory/

# Où chercher les rôles
roles_path = roles/

# Sortie plus lisible que le JSON par défaut
stdout_callback = ansible.builtin.default
result_format = yaml

# Affiche les tâches "skipped" pour comprendre ce qui se passe (utile pour apprentissage)
display_skipped_hosts = True

# Vérification de l'empreinte SSH du serveur (sécurité par défaut)
host_key_checking = True

# Évite de créer des fichiers .retry après échec
retry_files_enabled = False

[ssh_connection]
# Optimisation : réduit le nombre d'opérations SSH par tâche
pipelining = True
